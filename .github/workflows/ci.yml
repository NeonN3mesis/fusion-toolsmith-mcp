name: CI

on:
  push:
  pull_request:

jobs:
  test-and-package:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install local CLI
        run: python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Check offline MCP schema export
        run: fusion-mcp dump-schemas --output dist/mcp-schemas.json

      - name: Check CLI command surface
        run: fusion-mcp --help

      - name: Build Fusion add-in package
        run: fusion-mcp package-addin

      - name: Upload add-in package
        uses: actions/upload-artifact@v4
        with:
          name: FusionMCP-addin
          path: dist/FusionMCP-addin.zip
